<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" >
<head>
  <meta charset="UTF-8">
  <title>Title</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <style>
    .container {
      width: 768px;
      margin: 20px auto 0;
    }
  </style>
</head>
<body>

<div class="container">
      <span th:text="${message}"></span>
      <form th:action="@{/foods/add}" th:object="${food}" method="post">
          <div class="mb-3">
              <label for="name" class="form-label">Food Name</label>
              <input th:field="*{name}" name="name" type="text" class="form-control" id="name" />
          </div>
          <div class="mb-3">
              <label for="price" class="form-label">Price</label>
              <input th:field="*{price}" name="price" type="text" class="form-control" id="price" />
          </div>
          <div class="mb-3">
              <label for="qty" class="form-label">Quantity</label>
              <input th:field="*{qty}" name="qty"  type="text" class="form-control" id="qty" />
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
      </form>


</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
</body>
</html>
